version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: karbone-web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=file:./prisma/dev.db
    volumes:
      - ./backend/prisma:/app/backend/prisma
    networks:
      - karbone-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:latest
    container_name: karbone-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./certbot:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - karbone-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  karbone-network:
    driver: bridge
